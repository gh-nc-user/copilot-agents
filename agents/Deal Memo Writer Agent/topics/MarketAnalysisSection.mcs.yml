# Name: MarketAnalysisSection
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: OnRecognizedIntent_MarketAnalysisSection_q3r7
  intent:
  actions:
    - kind: SendActivity
      id: SendActivity_market_processing
      activity: Processing Market Analysis from specialist output...
    - kind: SetVariable
      id: SetVariable_marketSection
      variable: Topic.MarketSection
      value: =concat("## Market Analysis\n\n*(per Market Analysis Agent)*\n\n", variables('Topic.MarketAgentOutput'))
    - kind: SendActivity
      id: SendActivity_marketDisplay
      activity: =variables('Topic.MarketSection')
    - kind: EndDialog
      id: EndDialog_market
